<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ question.question_text }} Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="bg-white p-4 rounded shadow mx-auto" style="max-width: 600px;">
            <h2 class="text-center mb-4">{{ question.question_text }} Results</h2>

            <ul class="list-group mb-3">
                {% for choice in question.choice_set.all %}
                    <li class="list-group-item">
                        {{ choice.choice_text }} -- {{ choice.votes }} vote{{ choice.votes|pluralize }}
                    </li>
                {% empty %}
                    <li class="list-group-item">No choices available.</li>
                {% endfor %}
            </ul>

            <div class="text-center">
                <a href="{% url 'polls:index' %}" class="btn btn-secondary">Back to Polls</a>
            </div>
        </div>
    </div>
</body>
</html>
